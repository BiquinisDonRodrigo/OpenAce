[python: app/**.py]
[python: server.py]

[jinja2: app/**/templates/**.html]
extensions=jinja2.ext.autoescape,jinja2.ext.with_

[extractors]
javascript = babel.messages.extract:extract_javascript

[javascript: app/**.js]
encoding = utf-8

# Inline HTML/CSS/JS lives inside Python triple-quoted strings. We rely on
# the python extractor above to find _( ) calls inside those strings; the
# keys themselves live in app/ui/i18n.py fallback catalog so the app works
# even before pybabel compile has run.
