services:
  kubo:
    image: ipfs/kubo:latest
    container_name: kubo-dev
    environment:
      - IPFS_PROFILE=server
    healthcheck:
      test: ["CMD", "ipfs", "--api", "/ip4/127.0.0.1/tcp/5001", "id"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - ./ipfs/export:/export
      - ./ipfs/data:/data/ipfs
      - ./ipfs/container-init.d/001-gateway-port.sh:/container-init.d/001-gateway-port.sh:ro
    ports:
      - "4001:4001/tcp"
      - "4001:4001/udp"
      - "127.0.0.1:5001:5001"
    expose:
      - "48080"
    networks:
      - acestream-net
    restart: unless-stopped

  open-ace:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: open-ace-dev
    environment:
      FLASK_APP: server.py
      FLASK_DEBUG: "1"
      PYTHONPATH: /openace
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      TZ: ${TZ:-Europe/Madrid}
      ACESTREAM_HOST: "127.0.0.1"
      ACESTREAM_PORT: "6878"
      IPFS_GATEWAY: "http://kubo:48080"
      DB_PATH: /openace/checkdb/data.db
    depends_on:
      kubo:
        condition: service_healthy
    volumes:
      - ./app:/openace/app
      - ./server.py:/openace/server.py
      - ./logs:/var/log/openace
      - ./data:/openace/checkdb
    ports:
      - "8888:8888"
      - "6878:6878"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        echo "[dev] Starting AceStream engine on port 6878"
        /openace/start-engine --client-console --port 6878 >> /var/log/openace/acestream.log 2>&1 &
        cd /openace
        echo "[dev] Starting Flask dev server with reload on :8888"
        exec python -m flask --app server:app run --host 0.0.0.0 --port 8888 --debug --reload
    networks:
      - acestream-net

networks:
  acestream-net:
    name: acestream-net
