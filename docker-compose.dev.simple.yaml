services:
  kubo:
    image: ipfs/kubo:latest
    container_name: kubo-dev
    environment:
      - IPFS_PROFILE=server
    volumes:
      - ./ipfs/export:/export
      - ./ipfs/data:/data/ipfs
      - ./ipfs/container-init.d/001-gateway-port.sh:/container-init.d/001-gateway-port.sh:ro
    ports:
      - "4001:4001/tcp"
      - "4001:4001/udp"
      - "127.0.0.1:5001:5001"
    expose:
      - "48080"
    networks:
      - acestream-net
    restart: unless-stopped

  open-ace:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: open-ace-dev
    init: true
    environment:
      FLASK_APP: server.py
      FLASK_DEBUG: "1"
      PYTHONPATH: /openace
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      TZ: ${TZ:-Europe/Madrid}
    depends_on:
      - kubo
    volumes:
      - ./app:/openace/app
      - ./server.py:/openace/server.py
      - ./data:/openace/checkdb
    ports:
      - "8888:8888"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        chown -R openace:openace /openace/checkdb /tmp/openace 2>/dev/null || true
        echo "[dev] Starting AceStream engine on port 6878"
        gosu openace /openace/start-engine --client-console --port 6878 2>&1 &
        cd /openace
        gosu openace python -m babel.messages.frontend compile -d app/translations -D messages || true
        echo "[dev] Starting Flask dev server with reload on :8888"
        exec gosu openace python -m flask --app server:app run --host 0.0.0.0 --port 8888 --debug --reload
    networks:
      - acestream-net

networks:
  acestream-net:
    name: acestream-net
