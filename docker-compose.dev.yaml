services:
  acestream-vpn:
    container_name: acestream-vpn-dev
    image: qmcgaw/gluetun:latest
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WG_PRIVATE_KEY}
      - VPN_PORT_FORWARDING=on
      - VPN_PORT_FORWARDING_PROVIDER=protonvpn
      - FIREWALL_INPUT_DOCKER_NETWORK=on
      - SERVER_COUNTRIES=${ProtonCountries}
      - HTTP_CONTROL_SERVER_ADDRESS=:8001
      - HEALTH_TARGET_ADDRESSES=cloudflare.com:80
      - TZ=${TZ:-Europe/Madrid}
    volumes:
      - ./gluetun-data:/tmp/gluetun
    ports:
      - "8888:8888"
      - "8001:8001"
    networks:
      - acestream-net
    restart: unless-stopped

  kubo:
    image: ipfs/kubo:latest
    container_name: kubo-dev
    environment:
      - IPFS_PROFILE=server
    volumes:
      - ./ipfs/export:/export
      - ./ipfs/data:/data/ipfs
      - ./ipfs/container-init.d/001-gateway-port.sh:/container-init.d/001-gateway-port.sh:ro
    ports:
      - "4001:4001/tcp"
      - "4001:4001/udp"
      - "127.0.0.1:5001:5001"
    expose:
      - "48080"
    networks:
      - acestream-net
    restart: unless-stopped

  open-ace:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: open-ace-dev
    init: true
    environment:
      FLASK_APP: server.py
      FLASK_DEBUG: "1"
      PYTHONPATH: /openace
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      TZ: ${TZ:-Europe/Madrid}
    depends_on:
      - acestream-vpn
      - kubo
    volumes:
      - ./app:/openace/app
      - ./server.py:/openace/server.py
      - ./engine.sh:/openace/engine.sh:ro
      - ./gluetun-data:/tmp/gluetun
      - ./data:/openace/checkdb
    network_mode: service:acestream-vpn
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        chown -R openace:openace /openace/checkdb /tmp/openace 2>/dev/null || true
        export PYTHONPATH=/openace
        # Use the shared engine + Gluetun/VPN port-forward logic (same as
        # start.sh in production). This writes the /tmp/openace markers
        # (vpn_mode, active_p2p_port, gluetun_p2p_port) that the dashboard and
        # /healthz read, and runs the port-forward watcher.
        source /openace/engine.sh
        engine_init
        start_engine &
        port_watch_loop &
        cd /openace
        gosu openace python -m babel.messages.frontend compile -d app/translations -D messages || true
        echo "[dev] Starting Flask dev server with reload on :8888"
        exec gosu openace python -m flask --app server:app run --host 0.0.0.0 --port 8888 --debug --reload
    restart: unless-stopped

networks:
  acestream-net:
    name: acestream-net
