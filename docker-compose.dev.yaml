services:
  acestream-vpn:
    container_name: acestream-vpn-dev
    image: qmcgaw/gluetun:latest
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WG_PRIVATE_KEY}
      - VPN_PORT_FORWARDING=on
      - SERVER_COUNTRIES=${ProtonCountries}
      - HTTP_CONTROL_SERVER_ADDRESS=:8001
      - HEALTH_TARGET_ADDRESSES=cloudflare.com:80
      - TZ=${TZ:-Europe/Madrid}
    volumes:
      - ./gluetun-data:/tmp/gluetun
    ports:
      - "8888:8888"
      - "8001:8001"
    networks:
      - acestream-net
    restart: unless-stopped

  kubo:
    image: ipfs/kubo:latest
    container_name: kubo-dev
    environment:
      - IPFS_PROFILE=server
    volumes:
      - ./ipfs/export:/export
      - ./ipfs/data:/data/ipfs
      - ./ipfs/container-init.d/001-gateway-port.sh:/container-init.d/001-gateway-port.sh:ro
    ports:
      - "4001:4001/tcp"
      - "4001:4001/udp"
      - "127.0.0.1:5001:5001"
    expose:
      - "48080"
    networks:
      - acestream-net
    restart: unless-stopped

  open-ace:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: open-ace-dev
    init: true
    environment:
      FLASK_APP: server.py
      FLASK_DEBUG: "1"
      PYTHONPATH: /openace
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      TZ: ${TZ:-Europe/Madrid}
    depends_on:
      - acestream-vpn
      - kubo
    volumes:
      - ./app:/openace/app
      - ./server.py:/openace/server.py
      - ./gluetun-data:/tmp/gluetun
      - ./data:/openace/checkdb
    network_mode: service:acestream-vpn
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        chown -R openace:openace /openace/checkdb /tmp/openace 2>/dev/null || true
        FORWARDED_PORT_FILE="/tmp/gluetun/forwarded_port"
        PORT=""
        echo "[dev] Looking for Gluetun forwarded port..."
        for i in {1..20}; do
          if [[ -s "$$FORWARDED_PORT_FILE" ]]; then
            PORT=$$(cat "$$FORWARDED_PORT_FILE")
            echo "[dev] Got Gluetun port: $$PORT"
            break
          fi
          echo "[dev] waiting for gluetun ($$i/20)"
          sleep 1
        done
        if [[ -z "$$PORT" ]]; then
          PORT=$$(gosu openace python3 -c 'from app.utils import environment_store; print(environment_store.get_str("ACESTREAM_PORT") or "6878")' 2>/dev/null || printf '6878')
          echo "[dev] No forwarded port; fallback to $$PORT"
        fi
        echo "[dev] Starting AceStream engine on port $$PORT"
        gosu openace /openace/start-engine --client-console --port "$$PORT" 2>&1 &
        cd /openace
        gosu openace python -m babel.messages.frontend compile -d app/translations -D messages || true
        echo "[dev] Starting Flask dev server with reload on :8888"
        exec gosu openace python -m flask --app server:app run --host 0.0.0.0 --port 8888 --debug --reload
    restart: unless-stopped

networks:
  acestream-net:
    name: acestream-net
