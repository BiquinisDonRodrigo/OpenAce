services:
  kubo:
    image: ipfs/kubo:latest
    container_name: kubo
    environment:
      - IPFS_PROFILE=server
    healthcheck:
      test: ["CMD", "ipfs", "--api", "/ip4/127.0.0.1/tcp/5001", "id"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - ./ipfs/export:/export
      - ./ipfs/data:/data/ipfs
      - ./ipfs/container-init.d/001-gateway-port.sh:/container-init.d/001-gateway-port.sh:ro
    ports:
      - "4001:4001/tcp"
      - "4001:4001/udp"
      - "127.0.0.1:5001:5001"
    expose:
      - "48080"
    networks:
      - acestream-net
    restart: unless-stopped

  open-ace:
    image: ghcr.io/biquinisdonrodrigo/openace:latest
    container_name: open-ace
    environment:
      TZ: ${TZ:-Europe/Madrid}
      ACESTREAM_HOST: "127.0.0.1"
      ACESTREAM_PORT: "6878"
      IPFS_GATEWAY: "http://kubo:48080"
      DB_PATH: /openace/checkdb/data.db
    depends_on:
      kubo:
        condition: service_healthy
    volumes:
      - ./logs:/var/log/openace
      - ./data:/openace/checkdb
    ports:
      - "8888:8888"
    networks:
      - acestream-net
    restart: unless-stopped

networks:
  acestream-net:
    name: acestream-net
