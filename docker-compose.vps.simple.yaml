# Produccion VPS sin VPN: OpenAce queda accesible solo por localhost.
# Publica internet con nginx/openace.conf en los puertos 80/443.
services:
  kubo:
    image: ipfs/kubo:latest
    container_name: kubo
    environment:
      - IPFS_PROFILE=server
    volumes:
      - ./ipfs/export:/export
      - ./ipfs/data:/data/ipfs
      - ./ipfs/container-init.d/001-gateway-port.sh:/container-init.d/001-gateway-port.sh:ro
    ports:
      - "4001:4001/tcp"
      - "4001:4001/udp"
      - "127.0.0.1:5001:5001"
    expose:
      - "48080"
    networks:
      - acestream-net
    restart: unless-stopped

  open-ace:
    image: ghcr.io/biquinisdonrodrigo/openace:latest
    container_name: open-ace
    init: true
    environment:
      TZ: ${TZ:-Europe/Madrid}
      REVERSE_PROXY: "true"
      FORWARDED_ALLOW_IPS: "*"
    depends_on:
      - kubo
    volumes:
      - ./data:/openace/checkdb
    ports:
      - "127.0.0.1:8888:8888"
    networks:
      - acestream-net
    restart: unless-stopped

networks:
  acestream-net:
    name: acestream-net
