# OpenAce — nginx reverse proxy con SSL
#
# Uso:
#   1. Copia este fichero a /etc/nginx/sites-available/openace.conf
#   2. Reemplaza _DOMAIN_ con tu dominio:
#        sed -i 's/_DOMAIN_/tu-dominio.com/g' /etc/nginx/sites-available/openace.conf
#   3. Genera certificados con Let's Encrypt:
#        certbot --nginx -d tu-dominio.com
#   4. Activa el sitio y reinicia nginx:
#        ln -sf /etc/nginx/sites-available/openace.conf /etc/nginx/sites-enabled/
#        nginx -t && systemctl restart nginx
#
# Upstream:
#   Por defecto apunta a 127.0.0.1:8888 (nginx instalado en la misma maquina).
#   Tambien es correcto con docker-compose.vps.yaml: Gluetun publica 8888 en
#   localhost. Solo usa otro upstream si nginx esta en otra maquina o dentro de
#   Docker con acceso directo a la red de contenedores.
#
# Ver DOC/03-despliegue-vps.md y DOC/11-escenarios-selfhost.md para la guia completa.

limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=setup:10m rate=3r/s;

# --- HTTP → HTTPS redirect + ACME challenge ---
server {
    listen 80;
    listen [::]:80;
    server_name _DOMAIN_;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _DOMAIN_;

    # Compresión para respuestas text/JSON (no afecta al streaming /play/)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/x-mpegurl
        application/vnd.apple.mpegurl;

    # Certificados (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/_DOMAIN_/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/_DOMAIN_/privkey.pem;

    # TLS hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # Cabeceras de seguridad
    add_header X-Content-Type-Options    nosniff always;
    add_header X-Frame-Options           DENY always;
    add_header Referrer-Policy           strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # Tamaño máximo de body (importaciones M3U ~50 MB)
    client_max_body_size 50m;

    # Ocultar versión de nginx
    server_tokens off;

    # Upstream:
    # - nginx en la misma maquina o compose VPS: 127.0.0.1
    # - proxy en VPS hacia casa: IP privada/tunel de la maquina de casa
    # - nginx dentro de Docker: nombre/IP accesible desde esa red Docker

    # Cabeceras proxy por defecto
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;
    proxy_http_version 1.1;

    # --- Rate limits ---

    location /api/auth/login {
        limit_req zone=auth burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8888;
    }

    location /api/setup/ {
        limit_req zone=setup burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8888;
    }

    # --- Streaming (MPEG-TS / HLS) — sin buffering, timeout largo ---

    location /play/ {
        proxy_pass http://127.0.0.1:8888;
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header X-Accel-Buffering "no" always;
    }

    # --- Todo lo demás ---

    location / {
        proxy_pass http://127.0.0.1:8888;
        proxy_read_timeout 120s;
    }

    # --- Logs ---

    access_log /var/log/nginx/openace_access.log;
    error_log  /var/log/nginx/openace_error.log;
}
