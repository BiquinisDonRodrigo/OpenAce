# OpenAce — nginx reverse proxy con SSL
#
# Uso:
#   1. Reemplaza _DOMAIN_ con tu dominio (o usa nginx/init-ssl.sh)
#   2. Genera certificados con Let's Encrypt (ver init-ssl.sh)
#   3. docker compose -f docker-compose.nginx.yaml up -d
#
# Si usas VPN (docker-compose.yaml), cambia el upstream
# de "open-ace:8888" a "acestream-vpn:8888".

limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=setup:10m rate=3r/s;

# --- HTTP → HTTPS redirect + ACME challenge ---
server {
    listen 80;
    listen [::]:80;
    server_name _DOMAIN_;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _DOMAIN_;

    # Certificados (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/_DOMAIN_/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/_DOMAIN_/privkey.pem;

    # TLS hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # Cabeceras de seguridad
    add_header X-Content-Type-Options    nosniff always;
    add_header X-Frame-Options           DENY always;
    add_header Referrer-Policy           strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # Tamaño máximo de body (importaciones M3U ~50 MB)
    client_max_body_size 50m;

    # Ocultar versión de nginx
    server_tokens off;

    # Cabeceras proxy por defecto
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;

    # --- Rate limits ---

    location /api/auth/login {
        limit_req zone=auth burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://open-ace:8888;
    }

    location /api/setup/ {
        limit_req zone=setup burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://open-ace:8888;
    }

    # --- Streaming (MPEG-TS / HLS) — sin buffering, timeout largo ---

    location /play/ {
        proxy_pass http://open-ace:8888;
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # --- Todo lo demás ---

    location / {
        proxy_pass http://open-ace:8888;
        proxy_read_timeout 120s;
    }

    # --- Logs ---

    access_log /var/log/nginx/openace_access.log;
    error_log  /var/log/nginx/openace_error.log;
}
